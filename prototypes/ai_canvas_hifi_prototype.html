<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Canvas High Fidelity Prototype</title>
<style>
:root{--bg:#f7f8fb;--panel:#ffffff;--line:#e8eaf0;--text:#1f2430;--muted:#8a91a3;--blue:#6657ff;--blue2:#8d7cff;--green:#31c76a;--yellow:#ffc83d;--danger:#ff5d5d;--shadow:0 18px 45px rgba(26,31,48,.12);--soft:0 6px 18px rgba(31,36,48,.08)}
*{box-sizing:border-box} body{margin:0;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;color:var(--text);user-select:none}.app{height:100vh;width:100vw;position:relative;background:#f8f9fc}.topbar{position:absolute;left:18px;right:18px;top:14px;height:50px;background:rgba(255,255,255,.84);backdrop-filter:blur(18px);border:1px solid rgba(225,228,238,.8);border-radius:18px;box-shadow:0 10px 30px rgba(31,36,48,.08);display:flex;align-items:center;z-index:20;padding:0 14px;gap:12px}.logo{width:28px;height:28px;border-radius:10px;background:linear-gradient(135deg,#6557ff,#9a8dff);box-shadow:0 8px 18px rgba(101,87,255,.28)}.project{font-weight:650;font-size:14px;letter-spacing:.1px}.top-spacer{flex:1}.iconbtn{width:34px;height:34px;border-radius:11px;border:1px solid transparent;background:transparent;display:grid;place-items:center;color:#5e6472;cursor:pointer}.iconbtn:hover{background:#f0f2f7}.zoom-pill{height:34px;padding:0 12px;border-radius:12px;border:1px solid #eceef5;background:#fff;display:flex;align-items:center;gap:10px;font-size:13px;color:#565e6f}.toolbar{position:absolute;left:22px;top:90px;width:54px;background:rgba(255,255,255,.88);backdrop-filter:blur(18px);border:1px solid rgba(225,228,238,.82);border-radius:20px;box-shadow:var(--soft);z-index:20;padding:8px;display:flex;flex-direction:column;gap:8px}.tool{width:38px;height:38px;border-radius:14px;display:grid;place-items:center;color:#6a7282;cursor:pointer;position:relative}.tool:hover{background:#f0f2f7}.tool.active{background:#eeeaff;color:var(--blue)}.tool.disabled{opacity:.35}.divider{height:1px;background:#ecedf3;margin:2px 4px}.canvas-wrap{position:absolute;inset:0;overflow:hidden;cursor:default}.canvas{position:absolute;width:1px;height:1px;transform-origin:0 0}.grid{position:absolute;inset:-200000px;background-image:radial-gradient(circle,rgba(94,101,121,.24) 1px,transparent 1.2px);background-size:24px 24px;background-position:0 0}.node{position:absolute;width:248px;background:rgba(255,255,255,.96);border:1px solid #e8eaf2;border-radius:18px;box-shadow:0 20px 44px rgba(31,36,48,.12);overflow:visible}.node.selected{outline:1.5px solid #7d6dff;box-shadow:0 24px 50px rgba(101,87,255,.18)}.node.grouped{box-shadow:0 18px 40px rgba(31,36,48,.10),0 0 0 6px rgba(101,87,255,.06)}.node-head{height:46px;display:flex;align-items:center;padding:0 12px 0 14px;border-bottom:1px solid #f0f1f5;gap:8px}.node-title{font-weight:700;font-size:14px;flex:1}.clear{width:28px;height:28px;border-radius:9px;border:0;background:transparent;color:#2f3545;display:grid;place-items:center;cursor:pointer}.clear.off{opacity:.25;pointer-events:none}.clear:hover{background:#f1f2f6}.run{height:28px;padding:0 10px;border-radius:10px;border:0;background:#1f2430;color:#fff;font-size:12px;font-weight:650;cursor:pointer}.content{padding:14px}.image-drop{height:142px;border-radius:15px;background:#f6f7fb;border:1px dashed #d9dde8;display:grid;place-items:center;overflow:hidden}.image-drop img{width:100%;height:100%;object-fit:cover}.prompt-area{width:100%;height:132px;border:0;outline:0;resize:none;background:#f7f8fb;border-radius:15px;padding:13px;font-size:13px;line-height:1.5;color:#333;font-family:inherit;user-select:text}.analysis{min-height:128px;background:#f7f8fb;border-radius:15px;padding:13px;font-size:13px;color:#4e5668;line-height:1.55}.port{position:absolute;width:14px;height:14px;border-radius:50%;border:3px solid #fff;box-shadow:0 3px 9px rgba(0,0,0,.15);z-index:5;cursor:crosshair}.port.in{left:-7px}.port.out{right:-7px}.port.text{background:var(--yellow)}.port.image{background:var(--green)}.port.top1{top:72px}.port.top2{top:104px}.port.top3{top:136px}.port.hover-ok{transform:scale(1.35);box-shadow:0 0 0 6px rgba(49,199,106,.16)}.port.hover-bad{background:var(--danger);transform:scale(1.35);box-shadow:0 0 0 6px rgba(255,93,93,.15)}svg.edges{position:absolute;left:-200000px;top:-200000px;width:400000px;height:400000px;overflow:visible;pointer-events:none}.edge{fill:none;stroke:#c9cedb;stroke-width:2.2;pointer-events:stroke;cursor:pointer}.edge.selected{stroke:#7163ff;stroke-width:3}.edge-hit{fill:none;stroke:transparent;stroke-width:16;pointer-events:stroke;cursor:pointer}.edge-delete{position:absolute;width:24px;height:24px;border-radius:50%;background:#ff5757;color:#fff;display:none;align-items:center;justify-content:center;z-index:18;font-size:18px;line-height:20px;box-shadow:0 8px 16px rgba(255,87,87,.28);cursor:pointer}.select-box{position:absolute;border:1.5px solid rgba(113,99,255,.7);background:rgba(113,99,255,.08);border-radius:8px;display:none;z-index:10}.node-menu{position:absolute;width:286px;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border:1px solid #e7e9f1;border-radius:20px;box-shadow:var(--shadow);z-index:40;display:none;padding:10px}.menu-title{font-weight:750;font-size:14px;padding:8px 10px}.search{height:38px;border:1px solid #eceef5;background:#f7f8fb;border-radius:13px;width:100%;outline:0;padding:0 12px;font-size:13px}.cat{font-size:12px;color:#8b92a3;margin:12px 10px 6px}.menu-item{height:42px;border-radius:13px;display:flex;align-items:center;padding:0 10px;gap:10px;cursor:pointer;font-size:13px}.menu-item:hover{background:#f3f4f8}.dot{width:10px;height:10px;border-radius:50%}.bottom{position:absolute;right:22px;bottom:22px;display:flex;align-items:center;gap:10px;z-index:20}.toggle,.zoomctl{height:40px;background:rgba(255,255,255,.9);border:1px solid #e6e8f0;border-radius:15px;box-shadow:var(--soft);display:flex;align-items:center;gap:8px;padding:0 12px;font-size:13px;color:#555d6d}.switch{width:34px;height:20px;background:#6d5cff;border-radius:20px;position:relative}.switch:before{content:"";position:absolute;width:16px;height:16px;right:2px;top:2px;background:white;border-radius:50%}.switch.off{background:#c8ccd8}.switch.off:before{right:16px}.toast{position:absolute;left:50%;bottom:28px;transform:translateX(-50%);background:#202536;color:#fff;border-radius:14px;padding:10px 14px;font-size:13px;z-index:99;opacity:0;transition:.2s}.toast.show{opacity:1}.group-box{position:absolute;border:1px dashed rgba(101,87,255,.55);background:rgba(101,87,255,.035);border-radius:24px;pointer-events:none;z-index:-1}.kbd{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;color:#9aa1b1}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <div class="logo"></div><div class="project">未命名项目</div><div class="top-spacer"></div>
    <button class="iconbtn" id="undo" title="撤销">↶</button><button class="iconbtn" id="redo" title="重做">↷</button>
    <div class="zoom-pill"><span id="zoomText">100%</span></div><button class="iconbtn" id="fit" title="适应视图">⛶</button>
  </div>
  <div class="toolbar">
    <div class="tool active" data-tool="select" title="选择">⌖</div>
    <div class="tool" data-tool="box" title="框选">▢</div>
    <div class="tool" id="addNode" title="添加节点">＋</div>
    <div class="divider"></div>
    <div class="tool" id="groupBtn" title="群组">⊞</div>
    <div class="tool" id="ungroupBtn" title="取消群组">⊟</div>
    <div class="tool" id="trashBtn" title="删除">⌫</div>
    <div class="divider"></div>
    <div class="tool" title="设置">⚙</div>
  </div>
  <div class="canvas-wrap" id="wrap">
    <div class="canvas" id="canvas"><div class="grid" id="grid"></div><svg class="edges" id="edges"></svg><div id="groups"></div></div>
    <div class="select-box" id="selectBox"></div><div class="edge-delete" id="edgeDelete">−</div>
  </div>
  <div class="node-menu" id="nodeMenu">
    <div class="menu-title">添加节点</div><input class="search" id="search" placeholder="搜索节点..." />
    <div class="cat">基础</div>
    <div class="menu-item" data-type="image"><span class="dot" style="background:#31c76a"></span>Image</div>
    <div class="menu-item" data-type="prompt"><span class="dot" style="background:#ffc83d"></span>Prompt</div>
    <div class="cat">AI 节点</div>
    <div class="menu-item" data-type="imageChat"><span class="dot" style="background:#31c76a"></span>Image Chat <span class="kbd">Run</span></div>
    <div class="menu-item" data-type="generate"><span class="dot" style="background:#31c76a"></span>Generate <span class="kbd">Run</span></div>
  </div>
  <div class="bottom"><div class="toggle">网格 <span class="switch" id="gridSwitch"></span></div><div class="toggle">吸附 <span class="switch" id="snapSwitch"></span></div><div class="zoomctl"><button class="iconbtn" id="minus">−</button><span id="zoomText2">100%</span><button class="iconbtn" id="plus">＋</button></div></div>
  <div class="toast" id="toast"></div>
</div>
<script>
const wrap=document.getElementById('wrap'),canvas=document.getElementById('canvas'),edgesSvg=document.getElementById('edges'),menu=document.getElementById('nodeMenu'),toast=document.getElementById('toast');
let scale=1, tx=window.innerWidth/2, ty=window.innerHeight/2, gridOn=true, snapOn=true, nodes=[], edges=[], selected=new Set(), selectedEdge=null, id=1, pan=false, dragNode=null, dragSel=false, start={}, connect=null, tool='select', group=null;
const types={image:{title:'Image',in:['image'],out:['image'],ai:false},prompt:{title:'Prompt',in:['text'],out:['text'],ai:false},imageChat:{title:'Image Chat',in:['image'],out:['text'],ai:true,run:'Run'},generate:{title:'Generate',in:['text','image'],out:['image'],ai:true,run:'Run'}};
function setTransform(){canvas.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;document.getElementById('zoomText').textContent=document.getElementById('zoomText2').textContent=Math.round(scale*100)+'%';}
function screenToWorld(x,y){return {x:(x-tx)/scale,y:(y-ty)/scale}}
function snap(v){return snapOn?Math.round(v/24)*24:v}
function makeNode(type,x,y,content){let n={id:'n'+id++,type,x:snap(x),y:snap(y),content:content||'',group:null};nodes.push(n);renderNode(n);saveState();return n}
function renderNode(n){let def=types[n.type],el=document.createElement('div');el.className='node';el.dataset.id=n.id;el.style.left=n.x+'px';el.style.top=n.y+'px';let has=!!n.content;el.innerHTML=`<div class="node-head"><div class="node-title">${def.title}</div>${def.ai?`<button class="run">${def.run}</button>`:''}<button class="clear ${has?'':'off'}">⌫</button></div><div class="content">${nodeContent(n)}</div>`;def.in.forEach((p,i)=>el.appendChild(port('in',p,i)));def.out.forEach((p,i)=>el.appendChild(port('out',p,i)));canvas.appendChild(el);bindNode(el,n);updateSelection();drawEdges()}
function port(io,t,i){let d=document.createElement('div');d.className=`port ${io} ${t} top${i+1}`;d.dataset.io=io;d.dataset.ptype=t;return d}
function nodeContent(n){if(n.type==='image')return `<div class="image-drop">${n.content?`<img src="${n.content}">`:''}</div>`; if(n.type==='prompt')return `<textarea class="prompt-area">${n.content||''}</textarea>`; if(n.type==='imageChat')return `<div class="analysis">${n.content||'图片分析结果会显示在这里'}</div>`; return `<div class="image-drop">${n.content?`<img src="${n.content}">`:''}</div>`}
function bindNode(el,n){el.addEventListener('mousedown',e=>{if(e.target.classList.contains('port'))return; if(e.button!==0)return; if(e.target.tagName==='TEXTAREA')return; if(!e.shiftKey&&!selected.has(n.id))selected.clear(); if(e.shiftKey){selected.has(n.id)?selected.delete(n.id):selected.add(n.id)} else selected.add(n.id); selectedEdge=null; updateSelection(); dragNode=n; dragSel=[...selected].map(id=>{let m=nodes.find(a=>a.id===id);return {id,x:m.x,y:m.y}}); start={x:e.clientX,y:e.clientY}; e.stopPropagation();});
 el.querySelector('.clear').onclick=e=>{n.content=''; rerender(); saveState(); e.stopPropagation()}; let ta=el.querySelector('textarea'); if(ta)ta.oninput=()=>{n.content=ta.value; el.querySelector('.clear').classList.toggle('off',!n.content)}; let run=el.querySelector('.run'); if(run)run.onclick=e=>{run.textContent='Running...';setTimeout(()=>{n.content=n.type==='imageChat'?'产品为现代简洁风格，黑色机身，适合户外商业场景。':n.content;run.textContent='Run';rerender()},650);e.stopPropagation()};
 el.querySelectorAll('.port').forEach(p=>{p.onmousedown=e=>{connect={from:n.id,type:p.dataset.ptype,io:p.dataset.io,x:e.clientX,y:e.clientY};e.stopPropagation();};});}
function rerender(){document.querySelectorAll('.node').forEach(e=>e.remove());nodes.forEach(renderNode);drawEdges();}
function updateSelection(){document.querySelectorAll('.node').forEach(el=>el.classList.toggle('selected',selected.has(el.dataset.id)));drawEdges();}
function portPos(nodeId,io,type){let n=nodes.find(a=>a.id===nodeId),def=types[n.type],arr=io==='out'?def.out:def.in,idx=arr.indexOf(type);let top=72+idx*32;return {x:n.x+(io==='out'?248:0),y:n.y+top}}
function bezier(a,b){let dx=Math.max(70,Math.abs(b.x-a.x)*.45);return `M ${a.x+200000} ${a.y+200000} C ${a.x+dx+200000} ${a.y+200000}, ${b.x-dx+200000} ${b.y+200000}, ${b.x+200000} ${b.y+200000}`}
function drawEdges(){edgesSvg.innerHTML='';edges.forEach(ed=>{let a=portPos(ed.source,'out',ed.type),b=portPos(ed.target,'in',ed.type),d=bezier(a,b);let hit=document.createElementNS('http://www.w3.org/2000/svg','path');hit.setAttribute('d',d);hit.setAttribute('class','edge-hit');hit.onclick=e=>{selectedEdge=ed.id;selected.clear();updateSelection();showEdgeDelete(ed);e.stopPropagation()};edgesSvg.appendChild(hit);let p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',d);p.setAttribute('class','edge '+(selectedEdge===ed.id?'selected':''));edgesSvg.appendChild(p)}); if(!selectedEdge)document.getElementById('edgeDelete').style.display='none'}
function showEdgeDelete(ed){let a=portPos(ed.source,'out',ed.type),b=portPos(ed.target,'in',ed.type);let sx=(a.x+b.x)/2*scale+tx, sy=(a.y+b.y)/2*scale+ty;let del=document.getElementById('edgeDelete');del.style.left=sx-12+'px';del.style.top=sy-12+'px';del.style.display='flex';del.onclick=()=>{edges=edges.filter(e=>e.id!==ed.id);selectedEdge=null;drawEdges();saveState()}}
wrap.onmousedown=e=>{menu.style.display='none'; if(e.button===1){pan=true;start={x:e.clientX,y:e.clientY,tx,ty};e.preventDefault();return} if(e.button===0&&tool==='box'){let p=screenToWorld(e.clientX,e.clientY);start={x:e.clientX,y:e.clientY,wx:p.x,wy:p.y};document.getElementById('selectBox').style.display='block';} else if(e.button===0){selected.clear();selectedEdge=null;updateSelection();}};
window.onmousemove=e=>{if(pan){tx=start.tx+e.clientX-start.x;ty=start.ty+e.clientY-start.y;setTransform()} if(dragNode){let dx=(e.clientX-start.x)/scale,dy=(e.clientY-start.y)/scale;dragSel.forEach(s=>{let n=nodes.find(a=>a.id===s.id);n.x=snap(s.x+dx);n.y=snap(s.y+dy);let el=document.querySelector(`[data-id="${n.id}"]`);if(el){el.style.left=n.x+'px';el.style.top=n.y+'px'}});drawEdges()} if(connect){document.querySelectorAll('.port').forEach(p=>p.classList.remove('hover-ok','hover-bad'));let el=document.elementFromPoint(e.clientX,e.clientY);if(el&&el.classList.contains('port'))el.classList.add(el.dataset.ptype===connect.type?'hover-ok':'hover-bad')} let sb=document.getElementById('selectBox'); if(sb.style.display==='block'){let x=Math.min(e.clientX,start.x),y=Math.min(e.clientY,start.y),w=Math.abs(e.clientX-start.x),h=Math.abs(e.clientY-start.y);Object.assign(sb.style,{left:x+'px',top:y+'px',width:w+'px',height:h+'px'});}}
window.onmouseup=e=>{if(dragNode){dragNode=null;saveState()} pan=false; if(connect){let el=document.elementFromPoint(e.clientX,e.clientY); if(el&&el.classList.contains('port')){let target=el.closest('.node').dataset.id, io=el.dataset.io; if(connect.type===el.dataset.ptype&&io!==connect.io&&target!==connect.from){let source=connect.io==='out'?connect.from:target, tar=connect.io==='out'?target:connect.from; edges.push({id:'e'+id++,source,target:tar,type:connect.type}); saveState()} else if(connect.type!==el.dataset.ptype)showToast('只能连接相同颜色的接口');} document.querySelectorAll('.port').forEach(p=>p.classList.remove('hover-ok','hover-bad'));connect=null;drawEdges()} let sb=document.getElementById('selectBox'); if(sb.style.display==='block'){let rect=sb.getBoundingClientRect();selected.clear();nodes.forEach(n=>{let x=n.x*scale+tx,y=n.y*scale+ty;if(x>rect.left&&x<rect.right&&y>rect.top&&y<rect.bottom)selected.add(n.id)});sb.style.display='none';updateSelection()}}
wrap.onwheel=e=>{if(e.metaKey||e.ctrlKey){e.preventDefault();let old=scale;scale=Math.min(4,Math.max(.15,scale*(e.deltaY<0?1.08:.92)));let mx=e.clientX,my=e.clientY;tx=mx-(mx-tx)*(scale/old);ty=my-(my-ty)*(scale/old);setTransform()}else{tx-=e.deltaX;ty-=e.deltaY;setTransform()}}
function deleteSelected(){if(selectedEdge){edges=edges.filter(e=>e.id!==selectedEdge);selectedEdge=null}else{edges=edges.filter(e=>!selected.has(e.source)&&!selected.has(e.target));nodes=nodes.filter(n=>!selected.has(n.id));selected.clear()}rerender();saveState()}
window.onkeydown=e=>{if(e.key==='Escape'){selected.clear();selectedEdge=null;updateSelection()} if(e.key==='Delete'||e.key==='Backspace')deleteSelected(); if((e.metaKey||e.ctrlKey)&&e.key==='v'){} }
document.getElementById('trashBtn').onclick=deleteSelected;document.getElementById('addNode').onclick=e=>{menu.style.left='86px';menu.style.top='166px';menu.style.display='block';document.getElementById('search').focus()};document.querySelectorAll('.menu-item').forEach(mi=>mi.onclick=()=>{let p=screenToWorld(window.innerWidth/2,window.innerHeight/2);makeNode(mi.dataset.type,p.x,p.y);menu.style.display='none'});document.querySelectorAll('.tool[data-tool]').forEach(t=>t.onclick=()=>{tool=t.dataset.tool;document.querySelectorAll('.tool[data-tool]').forEach(a=>a.classList.remove('active'));t.classList.add('active')});
document.getElementById('gridSwitch').onclick=()=>{gridOn=!gridOn;document.getElementById('grid').style.display=gridOn?'block':'none';document.getElementById('gridSwitch').classList.toggle('off',!gridOn)};document.getElementById('snapSwitch').onclick=()=>{snapOn=!snapOn;document.getElementById('snapSwitch').classList.toggle('off',!snapOn)};document.getElementById('plus').onclick=()=>{scale=Math.min(4,scale*1.12);setTransform()};document.getElementById('minus').onclick=()=>{scale=Math.max(.15,scale*.88);setTransform()};document.getElementById('fit').onclick=()=>{scale=1;tx=window.innerWidth/2;ty=window.innerHeight/2;setTransform()};
wrap.ondragover=e=>e.preventDefault();wrap.ondrop=e=>{e.preventDefault();[...e.dataTransfer.files].filter(f=>f.type.startsWith('image/')).forEach((f,i)=>{let r=new FileReader();r.onload=ev=>{let p=screenToWorld(e.clientX+i*36,e.clientY+i*36);makeNode('image',p.x,p.y,ev.target.result)};r.readAsDataURL(f)})};
window.addEventListener('paste',e=>{[...e.clipboardData.items].forEach(it=>{if(it.type.startsWith('image/')){let f=it.getAsFile(),r=new FileReader();r.onload=ev=>{let p=screenToWorld(window.innerWidth/2,window.innerHeight/2);makeNode('image',p.x,p.y,ev.target.result)};r.readAsDataURL(f)}})});
document.getElementById('groupBtn').onclick=()=>{selected.forEach(id=>nodes.find(n=>n.id===id).group='g1');rerender()};document.getElementById('ungroupBtn').onclick=()=>{selected.forEach(id=>nodes.find(n=>n.id===id).group=null);rerender()};
function showToast(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1200)} function saveState(){}
setTransform();makeNode('image',-340,-80);makeNode('prompt',20,-55);makeNode('imageChat',-160,220);edges.push({id:'e'+id++,source:'n1',target:'n3',type:'image'});drawEdges();
</script>
</body></html>
