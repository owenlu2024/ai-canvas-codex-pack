<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Canvas HiFi Prototype V2</title>
<style>
:root{--bg:#f7f8fb;--panel:#fff;--line:#e7eaf2;--text:#1f2430;--muted:#9097a8;--blue:#6b5cff;--green:#31c76a;--yellow:#ffc43b;--danger:#ff5757;--edge:#c6ccd9;--shadow:0 22px 52px rgba(30,36,52,.13);--soft:0 8px 22px rgba(30,36,52,.08)}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;color:var(--text);user-select:none}.app{position:relative;width:100vw;height:100vh;background:#f8f9fc}.topbar{position:absolute;left:16px;right:16px;top:14px;height:52px;z-index:50;background:rgba(255,255,255,.88);backdrop-filter:blur(18px);border:1px solid rgba(226,229,238,.85);border-radius:18px;box-shadow:var(--soft);display:flex;align-items:center;padding:0 14px;gap:12px}.logo{width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,#6258ff,#988bff);box-shadow:0 10px 20px rgba(98,88,255,.25);position:relative}.logo:after{content:"";position:absolute;inset:8px;border:1.8px solid #fff;border-radius:50%;box-shadow:9px 9px 0 -6px #fff,-9px 9px 0 -6px #fff}.project{font-size:15px;font-weight:700}.top-spacer{flex:1}.iconbtn{width:36px;height:36px;border-radius:12px;border:1px solid transparent;background:transparent;color:#5d6575;display:grid;place-items:center;cursor:pointer;font-size:18px}.iconbtn:hover{background:#f0f2f7}.zoom-pill{height:36px;min-width:86px;padding:0 14px;border-radius:13px;border:1px solid #e7eaf2;background:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#343b4d}.toolbar{position:absolute;left:22px;top:92px;width:58px;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:blur(18px);border:1px solid rgba(226,229,238,.86);border-radius:20px;box-shadow:var(--soft);padding:8px;display:flex;flex-direction:column;gap:7px}.tool{width:40px;height:44px;border-radius:14px;color:#576071;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;cursor:pointer;font-size:19px}.tool span{font-size:10px;font-weight:600}.tool:hover{background:#f2f4f8}.tool.active{background:#eef0ff;color:var(--blue)}.divider{height:1px;background:#edf0f6;margin:2px 6px}.wrap{position:absolute;inset:0;overflow:hidden;cursor:default}.canvas{position:absolute;width:1px;height:1px;transform-origin:0 0}.grid{position:absolute;left:-1000000px;top:-1000000px;width:2000000px;height:2000000px;z-index:-100;background-image:radial-gradient(circle,rgba(86,94,112,.22) 1.2px,transparent 1.4px);background-size:24px 24px;background-position:0 0}.edges{position:absolute;left:-1000000px;top:-1000000px;width:2000000px;height:2000000px;overflow:visible;z-index:1;pointer-events:none}.edge-path{fill:none;stroke:var(--edge);stroke-width:3;stroke-linecap:round;pointer-events:none}.edge-hit{fill:none;stroke:transparent;stroke-width:18;stroke-linecap:round;pointer-events:stroke;cursor:pointer}.edge-path.selected{stroke:#7566ff;stroke-width:3.5}.temp-edge{fill:none;stroke:#9ca4b5;stroke-width:3;stroke-linecap:round;stroke-dasharray:6 7;pointer-events:none}.node{position:absolute;width:270px;border-radius:20px;background:rgba(255,255,255,.97);border:1px solid #e7eaf2;box-shadow:var(--shadow);overflow:visible;z-index:10}.node.selected{outline:1.5px solid #7465ff;box-shadow:0 24px 54px rgba(99,86,255,.18),0 0 0 5px rgba(116,101,255,.06)}.node-head{height:54px;display:flex;align-items:center;gap:10px;padding:0 14px 0 16px;border-bottom:1px solid #eef0f5}.node-title{flex:1;font-size:18px;font-weight:800;letter-spacing:-.3px}.clear{width:28px;height:28px;border:0;background:transparent;color:#232939;border-radius:9px;display:grid;place-items:center;cursor:pointer}.clear.disabled{opacity:.25;pointer-events:none}.clear:hover{background:#f1f3f8}.run{height:34px;padding:0 16px;border:0;border-radius:14px;background:#202637;color:white;font-weight:800;font-size:14px;cursor:pointer;box-shadow:0 6px 16px rgba(32,38,55,.18)}.content{padding:16px}.image-drop{height:154px;border-radius:18px;background:#f6f7fb;border:1px dashed #d9dee9;overflow:hidden;display:grid;place-items:center;color:#a0a7b6}.image-drop img{width:100%;height:100%;object-fit:cover;display:block}.img-ico{width:44px;height:44px;border:4px solid #c7cdd8;border-radius:9px;position:relative}.img-ico:before{content:"";position:absolute;right:7px;top:7px;width:7px;height:7px;background:#c7cdd8;border-radius:50%}.img-ico:after{content:"";position:absolute;left:7px;right:7px;bottom:8px;height:18px;background:linear-gradient(135deg,transparent 45%,#c7cdd8 46% 55%,transparent 56%),linear-gradient(45deg,transparent 48%,#c7cdd8 49% 58%,transparent 59%)}.prompt-area,.analysis{width:100%;height:154px;border:0;outline:0;resize:none;border-radius:18px;background:#f7f8fb;padding:16px;font-size:15px;line-height:1.55;color:#3f4658;font-family:inherit;user-select:text}.prompt-area::placeholder{color:#9ba2b2}.analysis{user-select:none}.port{position:absolute;width:18px;height:18px;border-radius:50%;border:4px solid #fff;box-shadow:0 5px 14px rgba(24,30,46,.16);z-index:20;cursor:crosshair;transition:transform .12s, box-shadow .12s}.port.in{left:-9px}.port.out{right:-9px}.port.image{background:var(--green)}.port.text{background:var(--yellow)}.port.p0{top:122px}.port.p1{top:154px}.port.hover-ok{transform:scale(1.35);box-shadow:0 0 0 8px rgba(49,199,106,.16)}.port.hover-bad{background:var(--danger);transform:scale(1.35);box-shadow:0 0 0 8px rgba(255,87,87,.15)}.edge-delete{position:absolute;width:24px;height:24px;border-radius:50%;background:#ff5757;color:#fff;display:none;align-items:center;justify-content:center;z-index:70;font-size:21px;line-height:20px;font-weight:800;box-shadow:0 9px 18px rgba(255,87,87,.28);cursor:pointer}.select-box{position:absolute;display:none;border:1.5px solid rgba(116,101,255,.75);background:rgba(116,101,255,.08);border-radius:9px;z-index:80;pointer-events:none}.menu{position:absolute;width:300px;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border:1px solid #e7eaf2;border-radius:20px;box-shadow:var(--shadow);z-index:90;display:none;padding:10px}.menu-title{font-size:15px;font-weight:800;padding:8px 10px}.search{width:100%;height:40px;border:1px solid #e8ebf3;background:#f7f8fb;border-radius:14px;outline:none;padding:0 13px;font-size:14px;margin:2px 0 8px}.cat{font-size:12px;color:#8e96a8;font-weight:700;margin:11px 10px 6px}.menu-item{height:44px;border-radius:14px;display:flex;align-items:center;gap:11px;padding:0 12px;cursor:pointer;font-size:14px;font-weight:600}.menu-item:hover{background:#f2f4f8}.dot{width:11px;height:11px;border-radius:50%}.bottom{position:absolute;right:22px;bottom:22px;z-index:50;display:flex;align-items:center;gap:10px}.pill{height:42px;background:rgba(255,255,255,.92);border:1px solid #e7eaf2;border-radius:16px;box-shadow:var(--soft);display:flex;align-items:center;gap:10px;padding:0 12px;font-size:14px;font-weight:600;color:#4d5567}.switch{width:38px;height:22px;border-radius:99px;background:#6c5cff;position:relative;cursor:pointer}.switch:before{content:"";position:absolute;right:2px;top:2px;width:18px;height:18px;border-radius:50%;background:white;box-shadow:0 2px 5px rgba(0,0,0,.16)}.switch.off{background:#cbd0dc}.switch.off:before{right:18px}.toast{position:absolute;left:50%;bottom:82px;transform:translateX(-50%);z-index:100;background:#202637;color:#fff;border-radius:14px;padding:10px 14px;font-size:13px;opacity:0;transition:.18s}.toast.show{opacity:1}.group-frame{position:absolute;border:1.5px dashed rgba(116,101,255,.5);border-radius:26px;background:rgba(116,101,255,.035);z-index:2;pointer-events:none}.hidden{display:none!important}
</style>
</head>
<body>
<div class="app">
  <div class="topbar"><div class="logo"></div><div class="project">未命名项目</div><div class="top-spacer"></div><button class="iconbtn" id="undo">↶</button><button class="iconbtn" id="redo">↷</button><div class="zoom-pill" id="zoomText">100%</div><button class="iconbtn" id="fit">⛶</button></div>
  <div class="toolbar">
    <div class="tool active" data-tool="select">⌖<span>选择</span></div>
    <div class="tool" data-tool="box">▢<span>框选</span></div>
    <div class="tool" id="addBtn">＋<span>节点</span></div>
    <div class="divider"></div>
    <div class="tool" id="groupBtn">⊞<span>群组</span></div>
    <div class="tool" id="ungroupBtn">⊟<span>解组</span></div>
    <div class="tool" id="deleteBtn">⌫<span>删除</span></div>
    <div class="divider"></div>
    <div class="tool" id="settingBtn">⚙<span>设置</span></div>
  </div>
  <div class="wrap" id="wrap"><div class="canvas" id="canvas"><div class="grid" id="grid"></div><svg class="edges" id="edgesSvg"></svg><div id="groupLayer"></div></div><div class="select-box" id="selectBox"></div><div class="edge-delete" id="edgeDelete">−</div></div>
  <div class="menu" id="menu"><div class="menu-title">添加节点</div><input class="search" id="search" placeholder="搜索节点..."/><div class="cat">基础</div><div class="menu-item" data-type="image"><span class="dot" style="background:#31c76a"></span>Image</div><div class="menu-item" data-type="prompt"><span class="dot" style="background:#ffc43b"></span>Prompt</div><div class="cat">AI 节点</div><div class="menu-item" data-type="imageChat"><span class="dot" style="background:#31c76a"></span>Image Chat</div><div class="menu-item" data-type="generate"><span class="dot" style="background:#31c76a"></span>Generate</div></div>
  <div class="bottom"><div class="pill">网格 / 吸附 <span class="switch" id="gridSwitch"></span></div><div class="pill"><button class="iconbtn" id="minus">−</button><span id="zoomText2">100%</span><button class="iconbtn" id="plus">＋</button></div></div>
  <div class="toast" id="toast"></div>
</div>
<script>
const wrap=document.getElementById('wrap'), canvas=document.getElementById('canvas'), edgesSvg=document.getElementById('edgesSvg'), menu=document.getElementById('menu'), toast=document.getElementById('toast');
let nodes=[],edges=[],id=1,tx=window.innerWidth/2,ty=window.innerHeight/2,scale=1,tool='select',gridSnap=true,zTop=20;
let selected=new Set(),selectedEdge=null,drag=null,pan=null,box=null,connect=null,menuAt={x:0,y:0};
const defs={
 image:{title:'Image',inputs:['image'],outputs:['image'],ai:false,w:270,h:234},
 prompt:{title:'Prompt',inputs:['text'],outputs:['text'],ai:false,w:270,h:234},
 imageChat:{title:'Image Chat',inputs:['image'],outputs:['text'],ai:true,run:'Run',w:270,h:234},
 generate:{title:'Generate',inputs:['text','image'],outputs:['image'],ai:true,run:'Run',w:270,h:234}
};
function setTransform(){canvas.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;zoomText.textContent=zoomText2.textContent=Math.round(scale*100)+'%';positionEdgeDelete();}
function world(x,y){return {x:(x-tx)/scale,y:(y-ty)/scale}}
function screen(x,y){return {x:x*scale+tx,y:y*scale+ty}}
function snap(v){return gridSnap?Math.round(v/24)*24:v}
function showToast(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1200)}
function makeNode(type,x,y,content=''){let n={id:'n'+id++,type,x:snap(x),y:snap(y),content,z:zTop++,group:null};nodes.push(n);render();return n}
function nodeHTML(n){let d=defs[n.type],has=!!n.content,body='';
 if(n.type==='image'||n.type==='generate') body=`<div class="image-drop">${n.content?`<img src="${n.content}">`:'<div class="img-ico"></div>'}</div>`;
 if(n.type==='prompt') body=`<textarea class="prompt-area" placeholder="输入提示词">${n.content||''}</textarea>`;
 if(n.type==='imageChat') body=`<div class="analysis">${n.content||'图片分析结果会显示在这里'}</div>`;
 return `<div class="node-head"><div class="node-title">${d.title}</div>${d.ai?`<button class="run">${d.run}</button>`:''}<button class="clear ${has?'':'disabled'}">⌫</button></div><div class="content">${body}</div>`;
}
function addPorts(el,n){let d=defs[n.type];d.inputs.forEach((t,i)=>{let p=document.createElement('div');p.className=`port in ${t} p${i}`;p.dataset.io='in';p.dataset.type=t;el.appendChild(p)});d.outputs.forEach((t,i)=>{let p=document.createElement('div');p.className=`port out ${t} p${i}`;p.dataset.io='out';p.dataset.type=t;el.appendChild(p)});}
function render(){document.querySelectorAll('.node').forEach(e=>e.remove());nodes.forEach(n=>{let el=document.createElement('div');el.className='node';el.dataset.id=n.id;el.style.left=n.x+'px';el.style.top=n.y+'px';el.style.width=defs[n.type].w+'px';el.style.zIndex=n.z;el.innerHTML=nodeHTML(n);addPorts(el,n);canvas.appendChild(el);bindNode(el,n)});updateSelection();drawEdges();drawGroups();}
function bindNode(el,n){el.addEventListener('mousedown',e=>{if(e.button!==0||e.target.classList.contains('port')||e.target.tagName==='TEXTAREA'||e.target.closest('button'))return;selectedEdge=null;if(e.shiftKey){selected.has(n.id)?selected.delete(n.id):selected.add(n.id)}else{if(!selected.has(n.id)){selected.clear();selected.add(n.id)}}n.z=++zTop;selected.forEach(id=>{let m=nodes.find(a=>a.id===id);if(m)m.z=++zTop});updateSelection();drag={startX:e.clientX,startY:e.clientY,items:[...selected].map(id=>{let m=nodes.find(a=>a.id===id);return {id,x:m.x,y:m.y}})};e.stopPropagation();});
 const clear=el.querySelector('.clear');clear.onclick=e=>{n.content='';render();e.stopPropagation()};let ta=el.querySelector('textarea');if(ta)ta.addEventListener('input',()=>{n.content=ta.value;clear.classList.toggle('disabled',!n.content)});let run=el.querySelector('.run');if(run)run.onclick=e=>{run.textContent='Running';setTimeout(()=>{run.textContent='Run';if(n.type==='imageChat'){n.content='产品为现代极简风格，材质干净，适合商业空间、酒店户外和电商场景。';render()}},700);e.stopPropagation()};
 el.querySelectorAll('.port').forEach(p=>{p.addEventListener('mousedown',e=>{let pos=portCenter(n.id,p.dataset.io,p.dataset.type);connect={node:n.id,io:p.dataset.io,type:p.dataset.type,start:pos,mouse:world(e.clientX,e.clientY)};selectedEdge=null;drawEdges();e.stopPropagation();});});}
function updateSelection(){document.querySelectorAll('.node').forEach(el=>el.classList.toggle('selected',selected.has(el.dataset.id)));drawEdges();}
function nodeRect(n){return {x:n.x,y:n.y,w:defs[n.type].w,h:defs[n.type].h}}
function portCenter(nodeId,io,type){let n=nodes.find(a=>a.id===nodeId),d=defs[n.type],arr=io==='out'?d.outputs:d.inputs,idx=arr.indexOf(type),top=122+idx*32;return {x:n.x+(io==='out'?d.w:0),y:n.y+top}}
function curve(a,b){let dx=Math.max(72,Math.abs(b.x-a.x)*.45);return `M ${a.x+1000000} ${a.y+1000000} C ${a.x+dx+1000000} ${a.y+1000000}, ${b.x-dx+1000000} ${b.y+1000000}, ${b.x+1000000} ${b.y+1000000}`}
function drawEdges(){edgesSvg.innerHTML='';edges.forEach(ed=>{let a=portCenter(ed.source,'out',ed.type),b=portCenter(ed.target,'in',ed.type),d=curve(a,b);let hit=document.createElementNS('http://www.w3.org/2000/svg','path');hit.setAttribute('d',d);hit.setAttribute('class','edge-hit');hit.addEventListener('mousedown',e=>{selectedEdge=ed.id;selected.clear();updateSelection();positionEdgeDelete();e.stopPropagation()});edgesSvg.appendChild(hit);let p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',d);p.setAttribute('class','edge-path '+(selectedEdge===ed.id?'selected':''));edgesSvg.appendChild(p);});
 if(connect){let a=connect.start,b=connect.mouse;let p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',curve(a,b));p.setAttribute('class','temp-edge');edgesSvg.appendChild(p)} if(!selectedEdge)edgeDelete.style.display='none';}
function positionEdgeDelete(){if(!selectedEdge){edgeDelete.style.display='none';return}let ed=edges.find(e=>e.id===selectedEdge);if(!ed)return;let a=portCenter(ed.source,'out',ed.type),b=portCenter(ed.target,'in',ed.type),m=screen((a.x+b.x)/2,(a.y+b.y)/2);edgeDelete.style.left=m.x-12+'px';edgeDelete.style.top=m.y-12+'px';edgeDelete.style.display='flex';}
edgeDelete.onclick=()=>{if(selectedEdge){edges=edges.filter(e=>e.id!==selectedEdge);selectedEdge=null;drawEdges()}};
function drawGroups(){groupLayer.innerHTML='';let gs={};nodes.forEach(n=>{if(n.group){(gs[n.group] ||= []).push(n)}});Object.values(gs).forEach(list=>{let xs=list.map(n=>n.x),ys=list.map(n=>n.y),rs=list.map(n=>n.x+defs[n.type].w),bs=list.map(n=>n.y+defs[n.type].h);let el=document.createElement('div');el.className='group-frame';el.style.left=Math.min(...xs)-24+'px';el.style.top=Math.min(...ys)-24+'px';el.style.width=Math.max(...rs)-Math.min(...xs)+48+'px';el.style.height=Math.max(...bs)-Math.min(...ys)+48+'px';canvas.appendChild(el)});}
wrap.addEventListener('mousedown',e=>{menu.style.display='none';if(e.button===1){pan={x:e.clientX,y:e.clientY,tx,ty};e.preventDefault();return}if(e.button!==0)return;if(tool==='box'){let p=world(e.clientX,e.clientY);box={sx:e.clientX,sy:e.clientY,wx:p.x,wy:p.y};selectBox.style.display='block';}else{selected.clear();selectedEdge=null;updateSelection()}});
window.addEventListener('mousemove',e=>{if(pan){tx=pan.tx+e.clientX-pan.x;ty=pan.ty+e.clientY-pan.y;setTransform()}if(drag){let dx=(e.clientX-drag.startX)/scale,dy=(e.clientY-drag.startY)/scale;drag.items.forEach(it=>{let n=nodes.find(a=>a.id===it.id);n.x=snap(it.x+dx);n.y=snap(it.y+dy);let el=document.querySelector(`.node[data-id="${n.id}"]`);if(el){el.style.left=n.x+'px';el.style.top=n.y+'px';}});drawEdges();drawGroups()}if(connect){connect.mouse=world(e.clientX,e.clientY);document.querySelectorAll('.port').forEach(p=>p.classList.remove('hover-ok','hover-bad'));let el=document.elementFromPoint(e.clientX,e.clientY);if(el&&el.classList.contains('port'))el.classList.add(el.dataset.type===connect.type&&el.dataset.io!==connect.io?'hover-ok':'hover-bad');drawEdges()}if(box){let x=Math.min(e.clientX,box.sx),y=Math.min(e.clientY,box.sy),w=Math.abs(e.clientX-box.sx),h=Math.abs(e.clientY-box.sy);Object.assign(selectBox.style,{left:x+'px',top:y+'px',width:w+'px',height:h+'px'});}});
window.addEventListener('mouseup',e=>{if(drag){drag=null}pan=null;if(connect){let el=document.elementFromPoint(e.clientX,e.clientY);if(el&&el.classList.contains('port')){let target=el.closest('.node').dataset.id, io=el.dataset.io, t=el.dataset.type;if(t===connect.type&&io!==connect.io&&target!==connect.node){let source=connect.io==='out'?connect.node:target;let tar=connect.io==='out'?target:connect.node;if(!edges.some(ed=>ed.source===source&&ed.target===tar&&ed.type===t))edges.push({id:'e'+id++,source,target:tar,type:t});}else if(t!==connect.type){showToast('只能连接相同颜色的接口')}}connect=null;document.querySelectorAll('.port').forEach(p=>p.classList.remove('hover-ok','hover-bad'));drawEdges()}if(box){let rect=selectBox.getBoundingClientRect();selected.clear();nodes.forEach(n=>{let r=nodeRect(n),tl=screen(r.x,r.y),br=screen(r.x+r.w,r.y+r.h);if(!(br.x<rect.left||tl.x>rect.right||br.y<rect.top||tl.y>rect.bottom))selected.add(n.id)});box=null;selectBox.style.display='none';updateSelection()}});
wrap.addEventListener('wheel',e=>{if(e.metaKey||e.ctrlKey){e.preventDefault();let old=scale;scale=Math.min(4,Math.max(.15,scale*(e.deltaY<0?1.08:.92)));tx=e.clientX-(e.clientX-tx)*(scale/old);ty=e.clientY-(e.clientY-ty)*(scale/old);setTransform()}else{tx-=e.deltaX;ty-=e.deltaY;setTransform()}},{passive:false});
function deleteSelected(){if(selectedEdge){edges=edges.filter(e=>e.id!==selectedEdge);selectedEdge=null}else{edges=edges.filter(e=>!selected.has(e.source)&&!selected.has(e.target));nodes=nodes.filter(n=>!selected.has(n.id));selected.clear()}render()}
window.addEventListener('keydown',e=>{if(e.key==='Escape'){selected.clear();selectedEdge=null;updateSelection()}if(e.key==='Delete'||e.key==='Backspace')deleteSelected();});
document.querySelectorAll('.tool[data-tool]').forEach(t=>t.onclick=()=>{tool=t.dataset.tool;document.querySelectorAll('.tool[data-tool]').forEach(a=>a.classList.remove('active'));t.classList.add('active')});
addBtn.onclick=()=>{menu.style.left='88px';menu.style.top='182px';menu.style.display='block';search.focus()};document.querySelectorAll('.menu-item').forEach(mi=>mi.onclick=()=>{let p=world(window.innerWidth/2,window.innerHeight/2);makeNode(mi.dataset.type,p.x,p.y);menu.style.display='none'});
deleteBtn.onclick=deleteSelected;groupBtn.onclick=()=>{let gid='g'+id++;selected.forEach(s=>{let n=nodes.find(a=>a.id===s);if(n)n.group=gid});drawGroups()};ungroupBtn.onclick=()=>{selected.forEach(s=>{let n=nodes.find(a=>a.id===s);if(n)n.group=null});drawGroups()};
gridSwitch.onclick=()=>{gridSnap=!gridSnap;grid.style.display=gridSnap?'block':'none';gridSwitch.classList.toggle('off',!gridSnap)};plus.onclick=()=>{scale=Math.min(4,scale*1.12);setTransform()};minus.onclick=()=>{scale=Math.max(.15,scale*.88);setTransform()};fit.onclick=()=>{scale=1;tx=window.innerWidth/2;ty=window.innerHeight/2;setTransform()};
wrap.addEventListener('dragover',e=>e.preventDefault());wrap.addEventListener('drop',e=>{e.preventDefault();[...e.dataTransfer.files].filter(f=>f.type.startsWith('image/')).forEach((f,i)=>{let r=new FileReader();r.onload=ev=>{let p=world(e.clientX+i*36,e.clientY+i*36);makeNode('image',p.x,p.y,ev.target.result)};r.readAsDataURL(f)})});
window.addEventListener('paste',e=>{[...e.clipboardData.items].forEach(it=>{if(it.type.startsWith('image/')){let r=new FileReader();r.onload=ev=>{let p=world(window.innerWidth/2,window.innerHeight/2);makeNode('image',p.x,p.y,ev.target.result)};r.readAsDataURL(it.getAsFile())}})});
setTransform();makeNode('image',-500,-130);makeNode('imageChat',-80,110);makeNode('prompt',370,-60);edges.push({id:'e'+id++,source:'n1',target:'n2',type:'image'});render();
