<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>无限画布节点原型</title>
<style>
  :root{--bg:#f8fafc;--line:#e5e7eb;--blue:#6366f1;--green:#28c76f;--yellow:#f5c400;--text:#111827;--muted:#9ca3af;}
  *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"PingFang SC",sans-serif;color:var(--text);overflow:hidden;background:#fff}
  .topbar{position:fixed;top:0;left:0;right:0;height:62px;background:rgba(255,255,255,.92);border-bottom:1px solid #e5e7eb;display:flex;align-items:center;z-index:20;padding:0 18px;backdrop-filter:blur(10px)}
  .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#5465ff,#855cf8);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;margin-right:18px}.title{font-size:20px;font-weight:700}.top-right{margin-left:auto;display:flex;gap:10px;align-items:center}.btn{height:38px;padding:0 14px;border:1px solid #e5e7eb;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 1px 2px rgba(0,0,0,.03);cursor:pointer;user-select:none}.btn:hover{background:#f8fafc}.zoomText{min-width:78px;font-weight:600;text-align:center}
  .toolbar{position:fixed;top:86px;left:16px;width:78px;background:rgba(255,255,255,.95);border:1px solid #e5e7eb;border-radius:14px;box-shadow:0 8px 24px rgba(15,23,42,.08);z-index:30;padding:10px 7px;display:flex;flex-direction:column;gap:8px}.tool{height:58px;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;color:#374151;font-size:13px}.tool svg{width:23px;height:23px}.tool.active{background:#eef2ff;color:#4f46e5}.tool:hover{background:#f3f4f6}.tool.danger:hover{background:#fef2f2;color:#ef4444}
  .canvas-wrap{position:fixed;left:0;top:62px;right:0;bottom:0;overflow:hidden;background:#fafafa;cursor:default}.canvas{position:absolute;left:0;top:0;width:100%;height:100%;transform-origin:0 0;will-change:transform}.canvas.grid{background-image:radial-gradient(#cbd5e1 1.15px, transparent 1.15px);background-size:22px 22px}.edges{position:absolute;left:0;top:0;width:100%;height:100%;overflow:visible;pointer-events:none}.edge-path{fill:none;stroke:#9ca3af;stroke-width:3;pointer-events:stroke;cursor:pointer}.edge-path.selected{stroke:#6366f1;stroke-width:4}.edge-delete{pointer-events:auto;cursor:pointer}.edge-delete circle{fill:#ef4444}.edge-delete text{fill:#fff;font-weight:800;font-size:14px;text-anchor:middle;dominant-baseline:central}
  .node{position:absolute;width:280px;background:#fff;border:1px solid #e5e7eb;border-radius:14px;box-shadow:0 10px 22px rgba(15,23,42,.08);padding:14px;user-select:none}.node.selected{outline:1.5px solid #6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.08),0 10px 22px rgba(15,23,42,.08)}.node.grouped{box-shadow:0 0 0 2px rgba(99,102,241,.28),0 10px 22px rgba(15,23,42,.08)}
  .node-header{height:26px;display:flex;align-items:center;margin-bottom:12px}.node-title{font-size:20px;font-weight:800}.clear-btn{margin-left:auto;width:28px;height:28px;border:0;background:transparent;border-radius:8px;color:#111827;cursor:pointer;display:flex;align-items:center;justify-content:center}.clear-btn.disabled{color:#cbd5e1;cursor:not-allowed}.clear-btn:not(.disabled):hover{background:#f3f4f6}.content{height:170px;border-radius:10px;border:1px solid #e5e7eb;display:flex;align-items:center;justify-content:center;text-align:center;color:#6b7280;background:#f5fff8;overflow:hidden}.prompt .content{background:#fffaf0;align-items:flex-start;justify-content:flex-start;padding:14px;text-align:left}.content textarea{border:0;background:transparent;outline:none;resize:none;width:100%;height:100%;font-size:15px;line-height:1.5;font-family:inherit}.content img{width:100%;height:100%;object-fit:cover}.placeholder{pointer-events:none}.port{position:absolute;width:13px;height:13px;border-radius:999px;border:2px solid rgba(0,0,0,.12);cursor:crosshair}.port.left{left:-7px}.port.right{right:-7px}.port.text{background:var(--yellow)}.port.image{background:var(--green)}.port.valid{box-shadow:0 0 0 6px rgba(34,197,94,.18)}.port.invalid{box-shadow:0 0 0 6px rgba(239,68,68,.18)}
  .hint{position:fixed;right:24px;top:86px;width:380px;background:rgba(255,255,255,.96);border:1px solid #e5e7eb;border-radius:12px;box-shadow:0 8px 24px rgba(15,23,42,.08);padding:14px;z-index:25;font-size:14px;line-height:1.8}.hint b{font-size:15px}.toast{position:fixed;left:50%;bottom:86px;transform:translateX(-50%);background:#111827;color:#fff;border-radius:999px;padding:10px 16px;font-size:14px;z-index:99;opacity:0;transition:.2s}.toast.show{opacity:1}.bottom{position:fixed;right:24px;bottom:24px;background:#fff;border:1px solid #e5e7eb;border-radius:13px;box-shadow:0 8px 24px rgba(15,23,42,.08);display:flex;gap:10px;padding:9px;z-index:25}.dropzone{position:fixed;left:24px;bottom:24px;border:1px dashed #cbd5e1;background:rgba(255,255,255,.9);border-radius:12px;padding:16px 18px;color:#64748b;z-index:25;font-size:14px}.marquee{position:absolute;border:1px dashed #6366f1;background:rgba(99,102,241,.08);pointer-events:none;z-index:10}.group-box{position:absolute;border:1px dashed #8b5cf6;background:rgba(139,92,246,.04);border-radius:14px;pointer-events:none;z-index:0}.disabledTool{opacity:.45}
</style>
</head>
<body>
<div class="topbar"><div class="logo">⌬</div><div class="title">未命名项目</div><div class="top-right"><div class="btn" id="undo">↶</div><div class="btn" id="redo">↷</div><div class="btn zoomText" id="zoomLabel">100%</div><div class="btn" id="gridToggle">显示网格</div><div class="btn">⛶</div></div></div>
<div class="toolbar">
  <div class="tool active" data-tool="select">⌖<span>选择</span></div>
  <div class="tool" data-tool="marquee">▢<span>框选</span></div>
  <div class="tool" id="addNode">＋<span>添加节点</span></div>
  <div class="tool" id="groupBtn">▦<span>群组</span></div>
  <div class="tool" id="ungroupBtn">▧<span>取消群组</span></div>
  <div class="tool danger" id="deleteBtn">⌫<span>删除</span></div>
  <div class="tool" id="settingsBtn">⚙<span>设置</span></div>
</div>
<div class="hint"><b>使用提示</b><br>• 中键拖动画布；滚轮上下滚动；Cmd/Ctrl + 滚轮缩放<br>• 图片拖到画布空白处，自动创建 Image 节点<br>• 复制图片后 Ctrl/Cmd + V，自动创建 Image 节点<br>• 绿色只能连绿色，黄色只能连黄色<br>• Shift 点选可多选，Esc 取消选择</div>
<div class="canvas-wrap" id="wrap"><div class="canvas grid" id="canvas"><svg class="edges" id="edges"></svg></div></div>
<div class="dropzone">拖入图片到画布，自动创建图片节点</div>
<div class="bottom"><div class="btn" id="panBtn">✋</div><div class="btn" id="zoomOut">−</div><div class="btn zoomText" id="zoomLabel2">100%</div><div class="btn" id="zoomIn">＋</div></div><div class="toast" id="toast"></div>
<script>
const wrap=document.getElementById('wrap'), canvas=document.getElementById('canvas'), svg=document.getElementById('edges'), toast=document.getElementById('toast');
let state={nodes:[],edges:[],groups:[],selected:new Set(),selectedEdge:null,scale:1,pan:{x:0,y:0},grid:true,snap:true,tool:'select'};
let history=[], future=[]; let dragging=null, panning=null, connecting=null, marquee=null;
function saveHist(){history.push(JSON.stringify({nodes:state.nodes,edges:state.edges,groups:state.groups})); if(history.length>50)history.shift(); future=[]}
function uid(p){return p+'_'+Math.random().toString(36).slice(2,8)}
function show(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1300)}
function screenToWorld(x,y){const r=wrap.getBoundingClientRect();return{x:(x-r.left-state.pan.x)/state.scale,y:(y-r.top-state.pan.y)/state.scale}}
function updateTransform(){canvas.style.transform=`translate(${state.pan.x}px,${state.pan.y}px) scale(${state.scale})`;document.querySelectorAll('.zoomText').forEach(e=>e.textContent=Math.round(state.scale*100)+'%')}
function snap(v){return state.snap?Math.round(v/22)*22:v}
function addNode(type,x,y,content=null){saveHist();let n={id:uid(type),type,x:snap(x),y:snap(y),w:280,h:type==='prompt'?222:244,content:content||''};state.nodes.push(n);render();return n}
function render(){canvas.querySelectorAll('.node,.group-box,.marquee').forEach(e=>e.remove());renderGroups();state.nodes.forEach(n=>canvas.appendChild(nodeEl(n)));renderEdges();updateTransform()}
function nodeEl(n){const el=document.createElement('div');el.className='node '+(n.type==='prompt'?'prompt':'image')+(state.selected.has(n.id)?' selected':'')+(n.groupId?' grouped':'');el.style.left=n.x+'px';el.style.top=n.y+'px';el.style.width=n.w+'px';el.dataset.id=n.id;
 const title=n.type==='prompt'?'Prompt':'Image'; const has=!!n.content;
 el.innerHTML=`<div class="node-header"><div class="node-title">${title}</div><button class="clear-btn ${has?'':'disabled'}" title="清空内容">⌫</button></div><div class="content">${n.type==='prompt'?`<textarea placeholder="输入提示词">${n.content||''}</textarea>`:(n.content?`<img src="${n.content}">`:`<div class="placeholder">▧<br><br>拖拽图片到此处或双击上传</div>`)}</div><div class="port left ${n.type==='prompt'?'text':'image'}" data-side="left" data-type="${n.type==='prompt'?'text':'image'}" style="top:${n.h/2}px"></div><div class="port right ${n.type==='prompt'?'text':'image'}" data-side="right" data-type="${n.type==='prompt'?'text':'image'}" style="top:${n.h/2}px"></div>`;
 el.addEventListener('mousedown',e=>{if(e.target.classList.contains('port')||e.target.tagName==='TEXTAREA'||e.target.classList.contains('clear-btn'))return; selectNode(n.id,e.shiftKey); dragging={id:n.id,sx:e.clientX,sy:e.clientY,orig:state.nodes.filter(nn=>state.selected.has(nn.id)).map(nn=>({id:nn.id,x:nn.x,y:nn.y}))};});
 el.addEventListener('dblclick',()=>{if(n.type==='image')pickImage(n)});
 el.querySelector('.clear-btn').onclick=e=>{e.stopPropagation(); if(!n.content)return; saveHist(); n.content=''; render();};
 if(n.type==='prompt'){const ta=el.querySelector('textarea');ta.addEventListener('input',()=>{n.content=ta.value;el.querySelector('.clear-btn').classList.toggle('disabled',!n.content)})}
 el.querySelectorAll('.port').forEach(p=>p.addEventListener('mousedown',e=>{e.stopPropagation(); connecting={source:n.id,sourceSide:p.dataset.side,type:p.dataset.type,x:e.clientX,y:e.clientY};}));
 el.addEventListener('dragover',e=>e.preventDefault()); el.addEventListener('drop',e=>{e.preventDefault();handleFiles(e.dataTransfer.files,n)});
 return el}
function selectNode(id,shift){state.selectedEdge=null;if(shift){state.selected.has(id)?state.selected.delete(id):state.selected.add(id)}else{state.selected=new Set([id])}render()}
function renderGroups(){state.groups.forEach(g=>{const ids=g.nodeIds.map(id=>state.nodes.find(n=>n.id===id)).filter(Boolean);if(!ids.length)return;let minX=Math.min(...ids.map(n=>n.x))-18,minY=Math.min(...ids.map(n=>n.y))-18,maxX=Math.max(...ids.map(n=>n.x+n.w))+18,maxY=Math.max(...ids.map(n=>n.y+n.h))+18;let d=document.createElement('div');d.className='group-box';d.style.left=minX+'px';d.style.top=minY+'px';d.style.width=maxX-minX+'px';d.style.height=maxY-minY+'px';canvas.appendChild(d)})}
function portPos(id,side){let n=state.nodes.find(n=>n.id===id);return{x:n.x+(side==='right'?n.w:0),y:n.y+n.h/2}}
function renderEdges(){svg.innerHTML='';state.edges.forEach(ed=>{let a=portPos(ed.source,ed.sourceSide),b=portPos(ed.target,ed.targetSide);let dx=Math.max(80,Math.abs(b.x-a.x)*.45);let path=document.createElementNS('http://www.w3.org/2000/svg','path');path.setAttribute('d',`M${a.x},${a.y} C${a.x+dx},${a.y} ${b.x-dx},${b.y} ${b.x},${b.y}`);path.setAttribute('class','edge-path '+(state.selectedEdge===ed.id?'selected':''));path.onclick=e=>{e.stopPropagation();state.selected.clear();state.selectedEdge=ed.id;render()};svg.appendChild(path); if(state.selectedEdge===ed.id){let mx=(a.x+b.x)/2,my=(a.y+b.y)/2;let g=document.createElementNS('http://www.w3.org/2000/svg','g');g.setAttribute('class','edge-delete');g.innerHTML=`<circle cx="${mx}" cy="${my}" r="9"></circle><text x="${mx}" y="${my+0.5}">−</text>`;g.onclick=e=>{e.stopPropagation();saveHist();state.edges=state.edges.filter(x=>x.id!==ed.id);state.selectedEdge=null;render()};svg.appendChild(g)}})}
function handleFiles(files,targetNode=null,pos=null){[...files].filter(f=>f.type.startsWith('image/')).forEach((f,i)=>{let r=new FileReader();r.onload=()=>{if(targetNode){saveHist();targetNode.content=r.result;render()}else{let p=pos||screenToWorld(lastMouse.x,lastMouse.y);addNode('image',p.x+i*300,p.y+i*40,r.result)}};r.readAsDataURL(f)})}
function pickImage(n){let inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.onchange=()=>handleFiles(inp.files,n);inp.click()}
function deleteSelected(){if(state.selected.size||state.selectedEdge){saveHist();state.nodes=state.nodes.filter(n=>!state.selected.has(n.id));state.edges=state.edges.filter(e=>!state.selected.has(e.source)&&!state.selected.has(e.target)&&e.id!==state.selectedEdge);state.groups.forEach(g=>g.nodeIds=g.nodeIds.filter(id=>!state.selected.has(id)));state.selected.clear();state.selectedEdge=null;render()}}
let lastMouse={x:500,y:300};wrap.addEventListener('mousemove',e=>{lastMouse={x:e.clientX,y:e.clientY}; if(panning){state.pan.x=e.clientX-panning.x;state.pan.y=e.clientY-panning.y;updateTransform()} if(dragging){let dx=(e.clientX-dragging.sx)/state.scale,dy=(e.clientY-dragging.sy)/state.scale;dragging.orig.forEach(o=>{let n=state.nodes.find(n=>n.id===o.id);n.x=snap(o.x+dx);n.y=snap(o.y+dy)});render()} if(connecting){renderEdges();let p=screenToWorld(e.clientX,e.clientY),a=portPos(connecting.source,connecting.sourceSide);let tmp=document.createElementNS('http://www.w3.org/2000/svg','path');let dx=Math.max(80,Math.abs(p.x-a.x)*.45);tmp.setAttribute('d',`M${a.x},${a.y} C${a.x+dx},${a.y} ${p.x-dx},${p.y} ${p.x},${p.y}`);tmp.setAttribute('class','edge-path selected');svg.appendChild(tmp)} if(marquee){let p=screenToWorld(e.clientX,e.clientY);marquee.el.style.left=Math.min(p.x,marquee.x)+'px';marquee.el.style.top=Math.min(p.y,marquee.y)+'px';marquee.el.style.width=Math.abs(p.x-marquee.x)+'px';marquee.el.style.height=Math.abs(p.y-marquee.y)+'px'}});
wrap.addEventListener('mouseup',e=>{if(dragging){saveHist();dragging=null} if(panning)panning=null; if(connecting){let port=document.elementFromPoint(e.clientX,e.clientY); if(port&&port.classList.contains('port')){let target=port.closest('.node').dataset.id;let type=port.dataset.type;if(target!==connecting.source&&type===connecting.type){saveHist();state.edges.push({id:uid('edge'),source:connecting.source,sourceSide:connecting.sourceSide,target,targetSide:port.dataset.side,type});}else show(type!==connecting.type?'只能连接相同颜色的节点':'不能连接自己')} connecting=null;render()} if(marquee){let r={x:parseFloat(marquee.el.style.left),y:parseFloat(marquee.el.style.top),w:parseFloat(marquee.el.style.width),h:parseFloat(marquee.el.style.height)};state.selected.clear();state.nodes.forEach(n=>{if(n.x<r.x+r.w&&n.x+n.w>r.x&&n.y<r.y+r.h&&n.y+n.h>r.y)state.selected.add(n.id)});marquee.el.remove();marquee=null;render()}});
wrap.addEventListener('mousedown',e=>{if(e.button===1||state.tool==='pan'){panning={x:e.clientX-state.pan.x,y:e.clientY-state.pan.y};e.preventDefault();return} if(e.target===wrap||e.target===canvas||e.target===svg){if(state.tool==='marquee'){let p=screenToWorld(e.clientX,e.clientY);let el=document.createElement('div');el.className='marquee';el.style.left=p.x+'px';el.style.top=p.y+'px';canvas.appendChild(el);marquee={x:p.x,y:p.y,el}}else{state.selected.clear();state.selectedEdge=null;render()}}});
wrap.addEventListener('wheel',e=>{if(e.metaKey||e.ctrlKey){e.preventDefault();let before=screenToWorld(e.clientX,e.clientY);state.scale=Math.min(3,Math.max(.2,state.scale*(e.deltaY<0?1.08:.92)));let r=wrap.getBoundingClientRect();state.pan.x=e.clientX-r.left-before.x*state.scale;state.pan.y=e.clientY-r.top-before.y*state.scale;updateTransform()}else{state.pan.y-=e.deltaY;state.pan.x-=e.deltaX;updateTransform()}},{passive:false});
wrap.addEventListener('dragover',e=>e.preventDefault());wrap.addEventListener('drop',e=>{e.preventDefault();handleFiles(e.dataTransfer.files,null,screenToWorld(e.clientX,e.clientY))});
document.addEventListener('paste',e=>{let items=[...e.clipboardData.items];let files=items.filter(i=>i.type.startsWith('image/')).map(i=>i.getAsFile()); if(files.length)handleFiles(files,null,screenToWorld(lastMouse.x,lastMouse.y))});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){state.selected.clear();state.selectedEdge=null;render()} if(e.key==='Delete'||e.key==='Backspace')deleteSelected(); if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='z'){let old=history.pop(); if(old){future.push(JSON.stringify({nodes:state.nodes,edges:state.edges,groups:state.groups}));Object.assign(state,JSON.parse(old));state.selected=new Set();render()}}});
document.querySelectorAll('.tool[data-tool]').forEach(t=>t.onclick=()=>{state.tool=t.dataset.tool;document.querySelectorAll('.tool[data-tool]').forEach(x=>x.classList.remove('active'));t.classList.add('active')});
document.getElementById('addNode').onclick=()=>{let p=screenToWorld(innerWidth/2,innerHeight/2);addNode('image',p.x-320,p.y);addNode('prompt',p.x+20,p.y)};document.getElementById('deleteBtn').onclick=deleteSelected;
document.getElementById('groupBtn').onclick=()=>{if(state.selected.size<2)return show('至少选择两个节点');saveHist();let gid=uid('group');state.groups.push({id:gid,nodeIds:[...state.selected]});state.nodes.forEach(n=>{if(state.selected.has(n.id))n.groupId=gid});render()};
document.getElementById('ungroupBtn').onclick=()=>{saveHist();let gids=new Set(state.nodes.filter(n=>state.selected.has(n.id)&&n.groupId).map(n=>n.groupId));state.groups=state.groups.filter(g=>!gids.has(g.id));state.nodes.forEach(n=>{if(gids.has(n.groupId))delete n.groupId});render()};
document.getElementById('settingsBtn').onclick=()=>show('后期进入设置页');document.getElementById('gridToggle').onclick=()=>{state.grid=!state.grid;state.snap=state.grid;canvas.classList.toggle('grid',state.grid);document.getElementById('gridToggle').textContent=state.grid?'显示网格':'隐藏网格'};
document.getElementById('zoomIn').onclick=()=>{state.scale=Math.min(3,state.scale*1.1);updateTransform()};document.getElementById('zoomOut').onclick=()=>{state.scale=Math.max(.2,state.scale*.9);updateTransform()};
addNode('image',300,150);addNode('prompt',720,150);addNode('image',240,430);addNode('prompt',610,430);updateTransform();
</script>
</body>
</html>
